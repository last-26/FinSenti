base_model: "distilbert-base-uncased"
num_labels: 3
label_names:
  - negative
  - neutral
  - positive

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.1
  target_modules: ["q_lin", "v_lin"]
  task_type: "SEQ_CLS"

training:
  epochs: 8
  batch_size: 32
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_length: 128
  fp16: true
  gradient_accumulation_steps: 1
  output_dir: "./outputs/distilbert-lora"
  logging_steps: 50
  save_strategy: "epoch"
  seed: 42

eval:
  eval_strategy: "epoch"
  metric_for_best_model: "f1_macro"
  load_best_model_at_end: true

mlflow:
  experiment_name: "finsenti-distilbert"
  tracking_uri: "http://localhost:5000"
  run_name: "distilbert-lora"
